services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - 8080:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=host=${DB_HOST};port=${DB_PORT};database=${DB_NAME};user id=${DB_USER};password=${DB_PASSWORD};timeout=30;
    depends_on:
    - db
  db:
    image: postgres:18
    restart: always
    env_file:
      - .env
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
